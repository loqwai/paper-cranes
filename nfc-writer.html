<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>taco NFC writer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a14;
    --fg: #e5e7f0;
    --dim: #6b7080;
    --navy: #1a3470;
    --skyblue: #6cb0e8;
    --shadow: #1a1a1a;
    --taco-demo: #f39c12;
    --taco-direct-kick: #e74c3c;
    --taco-cubic-ease: #2ecc71;
    --taco-outline-tunnel: #34495e;
    --taco-rainbow-plume: #9b59b6;
    --taco-confident-kick: #c0392b;
    --taco-live-iter: #16a085;
    --taco-tortilla-cosmic: #e67e22;
    --taco-region-mask: #6cb0e8;
    --taco-plasma: #ff7eb6;
    --taco-seamless: #5fd0c8;
    --iris: #9b7ad0;
    --ok: #2ecc71;
    --err: #e74c3c;
    --warn: #f39c12;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  h1 {
    font-size: 18px;
    margin: 0;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .progress {
    font-size: 14px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .current {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .current.color-navy { border-left: 4px solid var(--navy); }
  .current.color-skyblue { border-left: 4px solid var(--skyblue); }
  .current.color-shadow { border-left: 4px solid var(--shadow); }
  .current.color-taco-demo { border-left: 4px solid var(--taco-demo); }
  .current.color-taco-direct-kick { border-left: 4px solid var(--taco-direct-kick); }
  .current.color-taco-cubic-ease { border-left: 4px solid var(--taco-cubic-ease); }
  .current.color-taco-outline-tunnel { border-left: 4px solid var(--taco-outline-tunnel); }
  .current.color-taco-rainbow-plume { border-left: 4px solid var(--taco-rainbow-plume); }
  .current.color-taco-confident-kick { border-left: 4px solid var(--taco-confident-kick); }
  .current.color-taco-live-iter { border-left: 4px solid var(--taco-live-iter); }
  .current.color-taco-tortilla-cosmic { border-left: 4px solid var(--taco-tortilla-cosmic); }
  .current.color-taco-region-mask { border-left: 4px solid var(--taco-region-mask); }
  .current.color-taco-plasma { border-left: 4px solid var(--taco-plasma); }
  .current.color-taco-seamless { border-left: 4px solid var(--taco-seamless); }
  .current.color-iris { border-left: 4px solid var(--iris); }
  .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }
  .next-name {
    font-size: 24px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    word-break: break-all;
  }
  .next-url {
    font-size: 13px;
    color: var(--dim);
    word-break: break-all;
    line-height: 1.4;
  }
  .write-btn {
    flex: 1;
    min-height: 200px;
    background: var(--ok);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 28px;
    font-weight: 600;
    cursor: pointer;
    transition: background 120ms;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .write-btn:active { background: #25a058; }
  .write-btn:disabled {
    background: var(--dim);
    opacity: 0.6;
  }
  .write-btn.writing { background: var(--warn); }
  .write-btn.error { background: var(--err); }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .controls button {
    padding: 12px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--fg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .controls button:active { background: rgba(255, 255, 255, 0.12); }
  .status {
    font-size: 14px;
    min-height: 20px;
    padding: 8px 12px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.04);
    text-align: center;
  }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
  .status.warn { color: var(--warn); }
  .queue {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
    padding: 8px;
    max-height: 240px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
  }
  .preview {
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    border: 1px solid rgba(255, 255, 255, 0.08);
    position: relative;
  }
  .preview iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    pointer-events: none;
  }
  .preview-label {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.6);
    background: rgba(0, 0, 0, 0.4);
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
  }
  .queue summary {
    cursor: pointer;
    color: var(--dim);
    padding: 4px 8px;
  }
  .queue ol {
    margin: 8px 0 0;
    padding-left: 24px;
  }
  .queue li {
    padding: 2px 0;
    cursor: pointer;
    color: var(--dim);
  }
  .queue li.done { text-decoration: line-through; opacity: 0.5; }
  .queue li.current { color: var(--fg); font-weight: 600; }
  .unsupported {
    background: var(--err);
    color: #fff;
    padding: 16px;
    border-radius: 8px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <h1 id="title">taco NFC writer</h1>
  <span class="progress" id="progress">0 / 50</span>
</header>

<div id="unsupported" class="unsupported" style="display:none">
  <strong>Web NFC not supported on this browser.</strong><br>
  Use Chrome/Edge on Android (HTTPS required). On iOS, Web NFC is not available — use NFC Tools instead.
</div>

<div class="current" id="current">
  <span class="label">Next tag</span>
  <span class="next-name" id="next-name">—</span>
  <span class="next-url" id="next-url">—</span>
</div>

<div class="preview" id="preview-wrap">
  <span class="preview-label" id="preview-label">preview</span>
  <iframe id="preview" title="shader preview" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<button class="write-btn" id="write" disabled>Tap a tag to write</button>

<div class="status" id="status">Ready.</div>

<div class="controls">
  <button id="prev">&larr; Prev</button>
  <button id="skip">Skip &rarr;</button>
  <button id="reset">Reset</button>
</div>

<details class="queue" id="queue-details">
  <summary>Queue (tap a row to jump)</summary>
  <ol id="queue"></ol>
</details>

// URL hash selects queue: #coat for the coat queue, default = taco
const QUEUE_NAME = (location.hash.replace("#", "") || "taco")
const QUEUE = QUEUES[QUEUE_NAME] || QUEUES.taco
document.getElementById("title").textContent = QUEUE_NAME + " NFC writer"
document.title = QUEUE_NAME + " NFC writer"

const STORAGE_KEY = QUEUE_NAME + "-nfc-writer-state"

const els = {
  unsupported: document.getElementById("unsupported"),
  current: document.getElementById("current"),
  nextName: document.getElementById("next-name"),
  nextUrl: document.getElementById("next-url"),
  progress: document.getElementById("progress"),
  write: document.getElementById("write"),
  status: document.getElementById("status"),
  prev: document.getElementById("prev"),
  skip: document.getElementById("skip"),
  reset: document.getElementById("reset"),
  queue: document.getElementById("queue"),
  preview: document.getElementById("preview"),
  previewLabel: document.getElementById("preview-label"),
  previewWrap: document.getElementById("preview-wrap"),
}

// Map nfc-variants.json full URLs (production) onto whichever origin we're on so
// the iframe renders locally during dev. Falls back to short URL if mapping missing.
let VARIANTS_BY_NAME = {}
const VARIANTS_URLS = {
  taco: "/shaders/redaphid/taco/nfc-variants.json",
  iris: "/shaders/redaphid/iris/nfc-variants.json",
}
const variantsUrl = VARIANTS_URLS[QUEUE_NAME] || null
if (variantsUrl) {
  fetch(variantsUrl)
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(list => {
      VARIANTS_BY_NAME = Object.fromEntries(list.map(v => [v.name, v]))
      render()
    })
    .catch(err => setStatus(`Could not load variants (${err}); preview disabled.`, "warn"))
}

function previewUrlFor(name) {
  const v = VARIANTS_BY_NAME[name]
  if (!v) return null
  // Replace the production origin with the local one so the iframe runs against dev/this host.
  // Add noaudio so the preview doesn't fight for the mic, and time=0 for a deterministic still.
  const fullUrl = new URL(v.full)
  const localUrl = new URL(fullUrl.pathname + fullUrl.search, location.origin)
  localUrl.searchParams.set("noaudio", "true")
  localUrl.searchParams.set("embed", "true")
  return localUrl.toString()
}

let state = loadState()

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY)
    if (raw) {
      const parsed = JSON.parse(raw)
      if (typeof parsed.index === "number" && Array.isArray(parsed.done)) return parsed
    }
  } catch (_) {}
  return { index: 0, done: [] }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state))
}

function setStatus(msg, kind = "") {
  els.status.textContent = msg
  els.status.className = "status" + (kind ? " " + kind : "")
}

let lastPreviewKey = null
function render() {
  const cur = QUEUE[state.index]
  if (!cur) {
    els.nextName.textContent = "All done."
    els.nextUrl.textContent = "Tap Reset to start over."
    els.write.disabled = true
    els.write.textContent = "Done"
    els.current.className = "current"
    setPreview(null, null)
  } else {
    els.nextName.textContent = cur.name
    els.nextUrl.textContent = cur.url
    els.current.className = "current color-" + cur.color
    els.write.disabled = false
    els.write.textContent = "Tap a tag to write"
    setPreview(cur.name, previewUrlFor(cur.name))
  }
  els.progress.textContent = `${state.done.length} / ${QUEUE.length}`
  renderQueue()
  saveState()
}

function setPreview(name, url) {
  if (!els.preview) return
  // Key on (name, url) so a name that was previously "unavailable" gets re-set
  // once VARIANTS_BY_NAME finishes loading.
  const key = name + "|" + (url || "")
  if (key === lastPreviewKey) return
  lastPreviewKey = key
  if (!url) {
    els.preview.removeAttribute("src")
    els.previewLabel.textContent = name ? "preview loading…" : "preview"
    return
  }
  els.preview.src = url
  els.previewLabel.textContent = name
}

function renderQueue() {
  els.queue.innerHTML = ""
  QUEUE.forEach((item, i) => {
    const li = document.createElement("li")
    li.textContent = item.name
    if (state.done.includes(i)) li.classList.add("done")
    if (i === state.index) li.classList.add("current")
    li.addEventListener("click", () => {
      state.index = i
      render()
      setStatus(`Jumped to ${item.name}.`)
    })
    els.queue.appendChild(li)
  })
}

async function writeCurrent() {
  const cur = QUEUE[state.index]
  if (!cur) return
  if (!("NDEFReader" in window)) {
    setStatus("Web NFC not available.", "err")
    return
  }
  els.write.classList.remove("error")
  els.write.classList.add("writing")
  els.write.textContent = "Hold tag to phone..."
  setStatus(`Writing ${cur.name}...`, "warn")

  try {
    const ndef = new NDEFReader()
    await ndef.write({
      records: [{ recordType: "url", data: cur.url }],
    })
    // Success
    if (!state.done.includes(state.index)) state.done.push(state.index)
    state.index++
    while (state.index < QUEUE.length && state.done.includes(state.index)) state.index++
    els.write.classList.remove("writing")
    setStatus(`✓ Wrote ${cur.name}. Next: ${QUEUE[state.index]?.name ?? "(done)"}`, "ok")
    if (navigator.vibrate) navigator.vibrate(80)
    render()
  } catch (e) {
    els.write.classList.remove("writing")
    els.write.classList.add("error")
    els.write.textContent = "Try again"
    setStatus(`Error: ${e.message || e}`, "err")
  }
}

els.write.addEventListener("click", writeCurrent)

els.prev.addEventListener("click", () => {
  if (state.index > 0) {
    state.index--
    render()
    setStatus(`Back to ${QUEUE[state.index].name}.`)
  }
})
els.skip.addEventListener("click", () => {
  if (state.index < QUEUE.length) {
    state.index++
    render()
    setStatus(`Skipped. Next: ${QUEUE[state.index]?.name ?? "(done)"}`)
  }
})
els.reset.addEventListener("click", () => {
  if (!confirm("Reset progress? This clears the 'done' list.")) return
  state = { index: 0, done: [] }
  render()
  setStatus("Reset.")
})

if (!("NDEFReader" in window)) {
  els.unsupported.style.display = "block"
  els.write.disabled = true
}

render()
</script>
</body>
</html>
